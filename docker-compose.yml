services:
  clawrity-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/clawrity
      - GROQ_API_KEY=${GROQ_API_KEY}
      - XIAOMI_API_KEY=${XIAOMI_API_KEY}
      - XIAOMI_BASE_URL=${XIAOMI_BASE_URL}
      - XIAOMI_REGION=${XIAOMI_REGION}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ACME_SLACK_WEBHOOK=${ACME_SLACK_WEBHOOK}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  postgres:
    image: ankane/pgvector
    environment:
      POSTGRES_DB: clawrity
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d clawrity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
